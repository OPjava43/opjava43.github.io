<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abscess Incision and Drainage</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>


    <nav>
        <ul>
            <li><a href="index.html#home">Home</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <div class="form-section">
            <h2 class="title">Procedure Note: Abscess Incision and Drainage</h2>
            <div data-section="consent"></div>
            <div data-section="location">    
                <h3>Location</h3>
                <button data-text="right">right</button>
                <button data-text="left">left</button>
                <button data-text="scalp">scalp</button>
                <button data-text="forehead">forehead</button>
                <button data-text="lip">lip</button>
                <button data-text="chin">chin</button>
                <button data-text="arm">arm</button>
                <button data-text="hand">hand</button>
                <button data-text="finger">finger</button>
                <button data-text="chest">chest</button>
                <button data-text="back">back</button>
                <button data-text="abdomen">abdomen</button>
                <button data-text="leg">leg</button>
                <button data-text="foot">foot</button>
                <button data-text="toe">toe</button>
                <textarea></textarea>
            </div>
            <div data-section="ultrasound">    
                <h3>Ultrasound</h3>
                <button data-text="ultrasound was used to visualize the abscess prior to incision">US used</button>
                <textarea></textarea>
            </div>
            <div data-section="technique">
                <h3>Technique</h3>
                <button data-text="the procedural area was prepped appropriately prior to incision">sterile procedure</button>
                <button data-text="the procedural area was anesthetized with lidocaine prior to the procedure">lido</button>
                <button data-text="the procedural area was anesthetized with lidocaine/epinephrine prior to the procedure">lido/epi</button>
                <button data-text="an 11 blade scalpel was used">#11</button>
                <button data-text="an 10 blade scalpel was used">#10</button>
                <button data-text="an 15 blade scalpel was used">#15</button>
                <button data-text="the abscess was deloculated">deloculation</button>
                <button data-text="the abscess pocket was irrigated with sterile saline">irrigation</button>
                <button data-text="packing was placed into the abscess cavity">packing</button>
                <button data-text="a loop drain was placed">loop drain</button>
                <button data-text="wound cultures were sent to the lab for ">cultures</button>
                <textarea></textarea>
            </div>
            <div data-section="result">
                <h3>Result</h3>
                <button data-text="scant">scant</button>
                <button data-text="moderate">moderate</button>
                <button data-text="copious">copious</button>
                <button data-text="purulent">purulent</button>
                <button data-text="bloody">bloody</button>
                <button data-text="serosanguinous">serosanguinous</button>
                <textarea placeholder="Enter the volume of fluid returned here"></textarea>
            </div>
            <div data-section="complications">
                <h3>Complications</h3>
                <button data-text="none">none</button>
                <button data-text="there was a mild amount of bleeding that was controlled at the time of procedure completion">bleeding</button>
                <button data-text="the patient experienced pain despite anesthetic application">pain</button>
                <textarea></textarea>
            </div>
            <div data-section="provider">
                <h3>Provider</h3>
                <textarea></textarea>
            </div>
        </div>

        <div class="output-section">
            <div id="outputArea"></div>
            <button onclick="copyOutput()">Copy to Clipboard</button>
            <button onclick="clearOutput()">Clear</button>
            
            <p><strong>To meet criteria for a 'Complex I/D', be sure to document use of an ultrasound, deloculations, irrigation, or packing!</strong></p>
        </div>
    </div>

    <footer>
    </footer>

    <script src="jstest/general.js"></script>
    <script src="jstest/shared.js"></script>
    <script>
        loadShared('consent');
    </script>
</body>
</html>
